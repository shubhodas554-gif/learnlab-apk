name: Build Flutter APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Go to project folder
        run: cd "LearnLab - Copy"

      - name: Recreate android project
        run: |
          cd "LearnLab - Copy"
          flutter create .

      - name: Install dependencies
        run: |
          cd "LearnLab - Copy"
          flutter pub get

      - name: Build APK
        run: |
          cd "LearnLab - Copy"
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: LearnLab - Copy/build/app/outputs/flutter-apk/app-release.apk
