name: learnlab
publish_to: "none"
version: 0.1.0
environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter: { sdk: flutter }
  go_router: ^14.0.0
  flutter_riverpod: ^2.5.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  cloud_firestore: ^5.4.4
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  flutter_local_notifications: ^17.1.0
  timezone: ^0.9.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.0
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^2.4.7
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_native_splash:
  color: "#F7F9FC"
  image: assets/icon.png
  android: true
  ios: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/icon.png
